<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Nimbus — Thank you</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#06121a"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M10 50 Q 50 18, 90 50 Q 50 82, 10 50 Z' fill='none' stroke='%2300e5b4' stroke-width='3'/><circle cx='50' cy='50' r='14' fill='none' stroke='%2300e5b4' stroke-width='2' opacity='0.5'/><rect x='48.8' y='40' width='2.4' height='20' rx='1.2' fill='%2300e5b4'/></svg>"/>
<style>
:root{
  --bg:#06121a;
  --bg-2:#0a1922;
  --ink:#e6f5f3;
  --ink-2:#8aa6ad;
  --ink-3:#516b75;
  --rule:#152935;
  --teal:#00e5b4;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Space Grotesk',system-ui,sans-serif;
  background:var(--bg);color:var(--ink-2);
  line-height:1.6;-webkit-font-smoothing:antialiased;
  min-height:100vh;display:grid;place-items:center;
}
.success{
  text-align:center;padding:40px 32px;max-width:560px;
}
.success h1{
  font-family:'Instrument Serif',serif;font-weight:400;
  font-size:clamp(36px,5vw,56px);line-height:1.05;
  letter-spacing:-0.02em;color:var(--ink);margin:0 0 16px;
}
.success h1 .it{font-style:italic;color:var(--teal)}
.success p{
  font-size:16px;color:var(--ink-2);margin:0 0 32px;line-height:1.7;
}
.download-btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:16px 40px;border:none;border-radius:8px;
  background:var(--teal);color:var(--bg);
  font-family:'Space Grotesk',sans-serif;font-weight:600;
  font-size:15px;letter-spacing:0.01em;cursor:pointer;
  text-decoration:none;
  transition:transform 0.2s ease,box-shadow 0.2s ease;
}
.download-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,229,180,0.2);
}
.download-btn:active{transform:translateY(0)}
.back-link{
  display:inline-block;margin-top:24px;
  font-family:'JetBrains Mono',monospace;font-size:12px;
  letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink-3);text-decoration:none;
  transition:color 0.25s ease;
}
.back-link:hover{color:var(--ink)}
.error-msg{
  color:#f87171;font-size:14px;margin-top:16px;display:none;
}
</style>
</head>
<body>
<div class="success">
  <h1>Thank <span class="it">you.</span></h1>
  <p>Your purchase is confirmed. Click below to download Nimbus. This link expires in 30 minutes &mdash; if you need it again, check your email.</p>
  <a id="downloadBtn" class="download-btn" href="#">Download Nimbus 1.0.0</a>
  <p id="errorMsg" class="error-msg">Something went wrong verifying your purchase. Please contact hello@nimbus.audio</p>
  <br>
  <a href="index.html" class="back-link">Back to home</a>
</div>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  // LemonSqueezy may pass order_id, checkout_id, or other params
  var orderId = params.get('order_id') || params.get('checkout_id') || params.get('id');
  var btn = document.getElementById('downloadBtn');
  var err = document.getElementById('errorMsg');

  if (orderId) {
    btn.href = '/api/download?order_id=' + encodeURIComponent(orderId);
    return;
  }

  // Fallback: wait a moment for webhook to process, then retry with a delay
  btn.textContent = 'Preparing download...';
  btn.style.opacity = '0.6';
  btn.style.pointerEvents = 'none';

  setTimeout(function(){
    // Try fetching the page URL params one more time (LemonSqueezy may redirect with params)
    var retryParams = new URLSearchParams(window.location.search);
    var retryId = retryParams.get('order_id') || retryParams.get('checkout_id') || retryParams.get('id');
    if (retryId) {
      btn.href = '/api/download?order_id=' + encodeURIComponent(retryId);
      btn.textContent = 'Download Nimbus 1.0.0';
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
    } else {
      btn.style.display = 'none';
      err.style.display = 'block';
    }
  }, 5000);
})();
</script>
</body>
</html>
