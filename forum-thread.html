<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Nimbus — Forum · Thread</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#000000"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M10 50 Q 50 18, 90 50 Q 50 82, 10 50 Z' fill='none' stroke='%234A9FD9' stroke-width='3'/><circle cx='50' cy='50' r='14' fill='none' stroke='%234A9FD9' stroke-width='2' opacity='0.5'/><rect x='48.8' y='40' width='2.4' height='20' rx='1.2' fill='%234A9FD9'/></svg>"/>
<style>
:root{
  --bg:#000000; --bg-2:#0a0a0b; --bg-3:#141415; --panel:#1a1a1c;
  --ink:#efefef; --ink-2:#a0a0a6; --ink-3:#6b6b72; --ink-4:#3a3a40;
  --rule:#222226; --rule-2:#2c2c32;
  --teal:#4A9FD9; --teal-deep:#3688C0; --cyan:#22d3ee; --blue:#3b82f6;
  --amber:#f5b94a; --rose:#ff7a8a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:'Space Grotesk',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--ink);
  font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;
  min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);
  background-size:64px 64px;
  mask-image:radial-gradient(ellipse 90% 50% at 50% 0%,#000 0%,transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse 90% 50% at 50% 0%,#000 0%,transparent 70%);
}

/* ── top nav ── */
nav{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  z-index:100;
  width:calc(100% - 48px);max-width:1200px;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;
  background:rgba(20,20,21,0.85);
  backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border:1px solid var(--rule);
  border-radius:80px;
  transition:top 0.5s cubic-bezier(0.16,1,0.3,1);
}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo svg{width:36px;height:36px}
.nav-logo span{
  font-family:'Urbanist',sans-serif;font-weight:700;font-size:16px;
  letter-spacing:0.12em;color:var(--ink);
}
.nav-links{display:flex;align-items:center;gap:20px;margin:0 12px}
.nav-links a{
  font-family:'Space Grotesk',sans-serif;
  font-size:16px;font-weight:600;color:#fff;
  padding:8px 14px;border-radius:8px;
  transition:color 0.3s,background 0.3s;
  text-decoration:none;
}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,0.05)}
.nav-contact{
  font-size:13px;font-weight:600;letter-spacing:0.04em;
  padding:10px 28px;border-radius:32px;
  background:transparent;color:var(--teal);
  border:1.5px solid var(--teal);
  transition:all 0.35s cubic-bezier(0.16,1,0.3,1);
  text-decoration:none;
}
.nav-contact:hover{background:rgba(74,159,217,0.1);box-shadow:0 0 24px rgba(74,159,217,0.15)}
.nav-cta{
  font-size:13px;font-weight:600;letter-spacing:0.04em;
  padding:10px 28px;border-radius:32px;
  background:var(--teal);color:#06121a;
  transition:all 0.35s cubic-bezier(0.16,1,0.3,1);
  text-decoration:none;
}
.nav-cta:hover{background:#00cc9e;box-shadow:0 0 24px rgba(74,159,217,0.3)}
.nav-buttons{display:flex;align-items:center;gap:10px}
@media(max-width:760px){
  .nav-links{display:none}
  .nav-buttons .nav-contact{display:none}
  nav{padding:12px 20px;width:calc(100% - 32px)}
}

/* ── layout ── */
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:30px 28px 90px}
.crumbs{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink-3);display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:26px;
}
.crumbs a{color:var(--ink-3);text-decoration:none;transition:color .15s}
.crumbs a:hover{color:var(--teal)}
.crumbs .sep{color:var(--ink-4)}
.crumbs .here{color:var(--ink-2)}

/* ── thread header ── */
.thread-head{margin-bottom:34px}
.tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tag{
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;font-weight:500;
  padding:5px 10px;border-radius:6px;border:1px solid var(--rule-2);color:var(--ink-2);background:var(--bg-2);
}
.tag.owner{color:var(--teal);border-color:rgba(74,159,217,0.45);background:rgba(74,159,217,0.06);display:inline-flex;align-items:center;gap:6px}
.tag.owner::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 7px var(--teal)}
.tag.cat{color:var(--cyan);border-color:rgba(34,211,238,0.35)}
h1.title{
  font-family:'Instrument Serif',serif;font-weight:400;
  font-size:clamp(34px,5vw,52px);line-height:1.04;letter-spacing:-0.01em;margin:0 0 18px;text-wrap:balance;
}
.thread-meta{
  display:flex;align-items:center;gap:22px;flex-wrap:wrap;
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.06em;color:var(--ink-3);
  padding-bottom:24px;border-bottom:1px solid var(--rule);
}
.thread-meta .stat{display:inline-flex;align-items:center;gap:8px}
.thread-meta .stat b{color:var(--ink);font-weight:600}

/* ── post (shared) ── */
.post{margin-bottom:8px}

.card{
  position:relative;border:1px solid var(--rule-2);border-radius:14px;background:var(--bg-2);
  padding:24px 26px;transition:border-color .2s,background .2s;
}
.post.op .card{
  border-color:rgba(74,159,217,0.35);
  background:linear-gradient(180deg,rgba(74,159,217,0.04),var(--bg-2) 40%);
  box-shadow:0 0 60px -30px rgba(74,159,217,0.5);
}

.byline{display:flex;align-items:center;gap:13px;margin-bottom:16px}
.avatar{
  width:42px;height:42px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;
  font-family:'JetBrains Mono',monospace;font-weight:600;font-size:16px;color:#06121a;
}
.who{display:flex;flex-direction:column;gap:2px;min-width:0}
.who .name-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.who .name{font-weight:600;font-size:15px;color:var(--ink)}
.role{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;font-weight:600;
  padding:3px 7px;border-radius:5px;
}
.role.op-role{color:var(--cyan);border:1px solid rgba(34,211,238,0.4);background:rgba(34,211,238,0.07)}
.role.owner-role{color:var(--teal);border:1px solid rgba(74,159,217,0.4);background:rgba(74,159,217,0.08)}
.who .sub{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.06em;color:var(--ink-3)}

.body{color:var(--ink);font-size:15.5px;line-height:1.66;white-space:pre-wrap;word-wrap:break-word}
.post.op .body{font-size:16.5px}
.body p{margin:0 0 14px}
.body p:last-child{margin-bottom:0}

/* post footer: reactions + actions */
.post-foot{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:20px;padding-top:16px;border-top:1px solid var(--rule)}
.post-foot .spring{margin-left:auto}
.act{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
  background:none;border:none;color:var(--ink-3);cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  padding:6px 4px;transition:color .15s;
}
.act:hover{color:var(--teal)}
.act svg{width:14px;height:14px}

/* ── replies section ── */
.replies-head{display:flex;align-items:baseline;justify-content:space-between;gap:18px;flex-wrap:wrap;margin:46px 0 4px}
.replies-head h2{font-family:'Instrument Serif',serif;font-weight:400;font-size:30px;margin:0}
.replies-head h2 .n{font-style:italic;color:var(--teal);margin-right:4px}
.sort{display:flex;gap:4px;background:var(--bg-2);border:1px solid var(--rule);border-radius:9px;padding:4px}
.sort button{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;
  padding:7px 13px;border-radius:6px;border:none;background:transparent;color:var(--ink-3);cursor:pointer;transition:all .14s;
}
.sort button:hover{color:var(--ink)}
.sort button.active{background:var(--bg-3);color:var(--teal)}
.reply-rule{height:1px;background:var(--rule);margin:22px 0 28px}
.reply-list{display:flex;flex-direction:column;gap:26px}
.reply-list .post{margin-bottom:0}

/* ── composer ── */
.composer{
  margin-top:48px;border:1px solid var(--rule-2);border-radius:16px;overflow:hidden;
  background:linear-gradient(180deg,var(--bg-2),rgba(10,25,34,0.5));position:relative;
}
.composer::before{content:'';position:absolute;top:0;left:24px;right:24px;height:1px;background:linear-gradient(90deg,transparent,var(--teal),transparent);opacity:0.6}
.composer-head{display:flex;align-items:center;gap:14px;padding:22px 26px 0}
.composer-head h3{font-family:'Instrument Serif',serif;font-weight:400;font-size:26px;margin:0}
.composer-head h3 .it{font-style:italic;color:var(--teal)}
.composer-body{padding:18px 26px 22px}
.composer-fields{display:flex;flex-direction:column;gap:14px}
.field-name{
  font-family:'Space Grotesk',sans-serif;font-size:14px;color:var(--ink);
  background:var(--bg);border:1px solid var(--rule-2);border-radius:9px;padding:12px 15px;width:100%;
  transition:border-color .15s,box-shadow .15s;
}
.field-msg{
  font-family:'Space Grotesk',sans-serif;font-size:15px;line-height:1.6;color:var(--ink);
  background:var(--bg);border:1px solid var(--rule-2);border-radius:9px;padding:14px 15px;width:100%;
  min-height:130px;resize:vertical;transition:border-color .15s,box-shadow .15s;
}
.field-name:focus,.field-msg:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(74,159,217,0.12)}
.field-name::placeholder,.field-msg::placeholder{color:var(--ink-3)}
.composer-foot{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-top:2px}
.composer-foot .note{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.08em;color:var(--ink-3)}
.composer-foot .note b{color:var(--ink-2)}
.btn-post{
  font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;
  padding:13px 24px;background:var(--teal);color:#06121a;border:none;border-radius:9px;cursor:pointer;
  display:inline-flex;align-items:center;gap:10px;
  box-shadow:0 0 0 1px rgba(74,159,217,0.4),0 14px 36px -16px rgba(74,159,217,0.6);transition:all .15s;
}
.btn-post:hover{background:#5FB5E8;transform:translateY(-2px);box-shadow:0 0 0 1px rgba(74,159,217,0.65),0 20px 48px -14px rgba(74,159,217,0.8)}


/* toast */
.toast{
  position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);z-index:50;
  background:var(--bg-3);border:1px solid var(--rule-2);border-radius:9px;padding:11px 18px;
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--teal);
  box-shadow:0 18px 50px -18px rgba(0,0,0,0.7),0 0 0 1px rgba(74,159,217,0.12);
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;display:inline-flex;align-items:center;gap:9px;
}
.toast::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* loading */
.loading{text-align:center;padding:60px 32px;color:var(--ink-3);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em}
.loading::after{
  content:'';display:inline-block;width:16px;height:16px;
  border:2px solid var(--teal);border-top-color:transparent;
  border-radius:50%;animation:spin 0.6s linear infinite;
  margin-left:10px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 32px}

@media(max-width:640px){
  .wrap{padding:24px 18px 80px}
  .nav-inner{padding:14px 18px}
  .nav-link.long{display:none}
  .post{grid-template-columns:1fr;gap:0}
}
@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto}}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 50 Q 50 18, 90 50 Q 50 82, 10 50 Z" fill="none" stroke="#4A9FD9" stroke-width="3"/>
      <circle cx="50" cy="50" r="14" fill="none" stroke="#4A9FD9" stroke-width="2" opacity="0.5"/>
      <rect x="42.8" y="47" width="2.4" height="6" rx="1.2" fill="#4A9FD9"/>
      <rect x="45.8" y="43" width="2.4" height="14" rx="1.2" fill="#4A9FD9"/>
      <rect x="48.8" y="40" width="2.4" height="20" rx="1.2" fill="#4A9FD9"/>
      <rect x="51.8" y="43" width="2.4" height="14" rx="1.2" fill="#4A9FD9"/>
      <rect x="54.8" y="47" width="2.4" height="6" rx="1.2" fill="#4A9FD9"/>
      <circle cx="44" cy="44" r="1.8" fill="#4A9FD9"/>
    </svg>
    <span>NIMBUS</span>
  </a>
  <div class="nav-links">
    <a href="/#pieces">Instruments</a>
    <a href="/#pricing">Pricing</a>
    <a href="/docs">Docs</a>
    <a href="/forum">Forum</a>
  </div>
  <div class="nav-buttons">
    <a href="mailto:hello@nimbus.audio" class="nav-contact">Contact Us</a>
    <a href="/#pricing" class="nav-cta">Get Nimbus</a>
  </div>
</nav>

<main class="wrap">

  <div class="crumbs">
    <a href="/forum">Forum</a><span class="sep">/</span>
    <span class="here" id="crumbTitle">Thread</span>
  </div>

  <!-- thread header (rendered by JS) -->
  <header class="thread-head" id="threadHead" style="display:none"></header>

  <!-- OP post (rendered by JS) -->
  <div id="opPost"></div>

  <!-- loading state -->
  <div id="loadingState" class="loading">Loading thread</div>

  <!-- replies section (rendered by JS) -->
  <div id="repliesSection" style="display:none">
    <div class="replies-head">
      <h2><span class="n" id="replyCount">0</span> Replies</h2>
      <div class="sort">
        <button class="active" onclick="setSort(this,'newest')">Newest</button>
        <button onclick="setSort(this,'oldest')">Oldest</button>
      </div>
    </div>
    <div class="reply-rule"></div>
    <div class="reply-list" id="replyList"></div>
  </div>

  <!-- composer -->
  <section class="composer" id="composer" style="display:none">
    <div class="composer-head">
      <h3>Join the <span class="it">conversation</span></h3>
    </div>
    <div class="composer-body">
      <div class="composer-fields">
        <input class="field-name" id="nameField" type="text" placeholder="Your name" autocomplete="name"/>
        <textarea class="field-msg" id="msgField" placeholder="Share what worked, ask a follow-up, or help someone out…"></textarea>
        <div class="composer-foot">
          <span class="note">Be kind, stay on topic</span>
          <button class="btn-post" onclick="postReply()">Post reply</button>
        </div>
      </div>
    </div>
  </section>

</main>

<div class="toast" id="toast">Saved</div>

<script>
(function(){
  var toast=document.getElementById('toast'),tt;
  window.showToast=function(m){toast.textContent=m;toast.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){toast.classList.remove('show')},1900)};

  var threadId = new URLSearchParams(window.location.search).get('id');
  var threadData = null;
  var commentsData = [];
  var sortMode = 'newest';
  var opName = '';

  if (!threadId) {
    document.getElementById('loadingState').innerHTML = '<div class="empty-state"><h2 style="font-family:Instrument Serif,serif;font-weight:400;font-size:28px;color:var(--ink)">Invalid thread</h2></div>';
    return;
  }

  loadThread();

  async function loadThread() {
    try {
      var response = await fetch('/api/forum/thread?id=' + threadId);
      if (!response.ok) throw new Error('Thread not found');
      var result = await response.json();
      threadData = result.thread;
      commentsData = result.comments || [];
      opName = threadData.name;
      render();
    } catch (err) {
      console.error('Failed to load thread:', err);
      document.getElementById('loadingState').innerHTML = '<div class="empty-state"><h2 style="font-family:Instrument Serif,serif;font-weight:400;font-size:28px;color:var(--ink)">Error loading thread</h2></div>';
    }
  }

  function render() {
    document.getElementById('loadingState').style.display = 'none';

    // Update page title
    document.title = 'Nimbus — ' + threadData.title;

    // Breadcrumb
    document.getElementById('crumbTitle').textContent = truncate(threadData.title, 40);

    // Thread header
    var head = document.getElementById('threadHead');
    head.style.display = 'block';
    var topicLabels = {
      'setup': 'Setup & Tracking', 'daw': 'DAW Integration',
      'gestures': 'Gestures & Mapping', 'feature-request': 'Feature Requests',
      'bug': 'Bug Reports', 'general': 'General'
    };
    var tagsHtml = '';
    if (threadData.owns_nimbus) tagsHtml += '<span class="tag owner">Nimbus Owner</span>';
    var topicLabel = topicLabels[threadData.topic] || threadData.topic || 'General';
    tagsHtml += '<span class="tag cat">' + escapeHtml(topicLabel) + '</span>';

    var date = new Date(threadData.created_at);
    var dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    head.innerHTML =
      '<div class="tags">' + tagsHtml + '</div>' +
      '<h1 class="title">' + escapeHtml(threadData.title) + '</h1>' +
      '<div class="thread-meta">' +
        '<span class="stat">Started by <b>' + escapeHtml(threadData.name) + '</b></span>' +
        '<span class="stat">' + dateStr + '</span>' +
        '<span class="stat"><b>' + commentsData.length + '</b> ' + (commentsData.length === 1 ? 'reply' : 'replies') + '</span>' +
      '</div>';

    // OP post
    var avatar = threadData.name.charAt(0).toUpperCase();
    var ownerBadge = threadData.owns_nimbus ? '<span class="role owner-role">Nimbus owner</span>' : '';
    var timeStr = date.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });

    document.getElementById('opPost').innerHTML =
      '<article class="post op">' +
        '<div class="card">' +
          '<div class="byline">' +
            '<div class="avatar" style="background:linear-gradient(135deg,#22d3ee,#3b82f6)">' + avatar + '</div>' +
            '<div class="who">' +
              '<div class="name-row"><span class="name">' + escapeHtml(threadData.name) + '</span><span class="role op-role">Original poster</span>' + ownerBadge + '</div>' +
              '<span class="sub"><span class="ts">' + timeStr + '</span></span>' +
            '</div>' +
          '</div>' +
          '<div class="body">' + escapeHtml(threadData.body) + '</div>' +
          '<div class="post-foot">' +
            '<span class="spring"></span>' +
            '<button class="act" onclick="focusComposer()">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg> Reply</button>' +
            '<button class="act" onclick="copyLink()">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v14"/></svg> Share</button>' +
          '</div>' +
        '</div>' +
      '</article>';

    // Replies
    renderReplies();

    // Show composer
    document.getElementById('composer').style.display = 'block';
  }

  function renderReplies() {
    var section = document.getElementById('repliesSection');
    section.style.display = 'block';
    document.getElementById('replyCount').textContent = commentsData.length;

    var sorted = commentsData.slice();
    if (sortMode === 'newest') sorted.sort(function(a,b){ return new Date(b.created_at) - new Date(a.created_at) });
    else sorted.sort(function(a,b){ return new Date(a.created_at) - new Date(b.created_at) });

    var list = document.getElementById('replyList');

    if (sorted.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--ink-3);font-family:JetBrains Mono,monospace;font-size:12px;letter-spacing:0.1em">No replies yet. Be the first!</div>';
      return;
    }

    var gradients = [
      'linear-gradient(135deg,#4A9FD9,#3688C0)',
      'linear-gradient(135deg,#f5b94a,#e0892c)',
      'linear-gradient(135deg,#22d3ee,#3b82f6)',
      'linear-gradient(135deg,#4A9FD9,#22d3ee)',
      'linear-gradient(135deg,#3b82f6,#8b5cf6)'
    ];

    list.innerHTML = sorted.map(function(comment, i) {
      var avatar = comment.name.charAt(0).toUpperCase();
      var grad = gradients[avatar.charCodeAt(0) % gradients.length];
      var isOp = comment.name === opName;
      var badges = '';
      if (isOp) badges += '<span class="role op-role">Original poster</span>';
      if (comment.owns_nimbus) badges += '<span class="role owner-role">Nimbus owner</span>';
      var cDate = new Date(comment.created_at);
      var cTimeStr = cDate.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });

      return '<article class="post reply">' +
        '<div class="card">' +
          '<div class="byline">' +
            '<div class="avatar" style="background:' + grad + '">' + avatar + '</div>' +
            '<div class="who">' +
              '<div class="name-row"><span class="name">' + escapeHtml(comment.name) + '</span>' + badges + '</div>' +
              '<span class="sub"><span class="ts">' + cTimeStr + '</span></span>' +
            '</div>' +
          '</div>' +
          '<div class="body">' + escapeHtml(comment.body) + '</div>' +
          '<div class="post-foot">' +
            '<span class="spring"></span>' +
            '<button class="act" onclick="focusComposer()">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg> Reply</button>' +
          '</div>' +
        '</div>' +
      '</article>';
    }).join('');
  }

  window.setSort = function(b, mode) {
    [].forEach.call(b.parentNode.children, function(x) { x.classList.remove('active') });
    b.classList.add('active');
    sortMode = mode;
    renderReplies();
    showToast('Sorted by ' + b.textContent.toLowerCase());
  };

  window.focusComposer = function() {
    document.getElementById('composer').scrollIntoView({ block: 'center' });
    setTimeout(function() { document.getElementById('msgField').focus() }, 350);
  };

  window.copyLink = function() {
    navigator.clipboard.writeText(window.location.href).then(function() {
      showToast('Link copied');
    });
  };

  window.postReply = function() {
    var name = document.getElementById('nameField').value.trim();
    var msgEl = document.getElementById('msgField');
    var msg = msgEl.value.trim();
    if (!name) { showToast('Enter your name'); document.getElementById('nameField').focus(); return; }
    if (!msg) { showToast('Write something first'); msgEl.focus(); return; }

    fetch('/api/forum/thread?id=' + threadId, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, body: msg })
    }).then(function(r) {
      if (!r.ok) throw new Error('Failed');
      showToast('Reply posted');
      msgEl.value = '';
      loadThread();
    }).catch(function(err) {
      showToast('Error posting reply');
    });
  };

  function truncate(s, n) {
    return s.length > n ? s.slice(0, n) + '…' : s;
  }

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
})();
</script>
</body>
</html>
