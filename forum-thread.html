<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Nimbus — Forum Thread</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#06121a"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M10 50 Q 50 18, 90 50 Q 50 82, 10 50 Z' fill='none' stroke='%2300e5b4' stroke-width='3'/><circle cx='50' cy='50' r='14' fill='none' stroke='%2300e5b4' stroke-width='2' opacity='0.5'/><rect x='48.8' y='40' width='2.4' height='20' rx='1.2' fill='%2300e5b4'/></svg>"/>
<style>
:root{
  --bg:#06121a;
  --bg-2:#0a1922;
  --bg-3:#0d2230;
  --ink:#e6f5f3;
  --ink-2:#8aa6ad;
  --ink-3:#516b75;
  --ink-4:#2d3f48;
  --rule:#152935;
  --rule-2:#1d3947;
  --teal:#00e5b4;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Space Grotesk',system-ui,sans-serif;
  background:var(--bg);color:var(--ink-2);
  line-height:1.6;-webkit-font-smoothing:antialiased;
}
.wrap{max-width:1000px;margin:0 auto;padding:0 32px}

/* NAV */
.nav{
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  background:rgba(6,18,26,0.85);
  border-bottom:1px solid var(--rule);
  padding:14px 0;
}
.nav-inner{
  max-width:1000px;margin:0 auto;padding:0 32px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav .logo{
  font-family:'Instrument Serif',serif;font-size:22px;
  color:var(--ink);text-decoration:none;font-weight:400;
}
.nav .logo span{color:var(--teal)}
.nav .back{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--ink-3);text-decoration:none;
  transition:color 0.25s ease;
}
.nav .back:hover{color:var(--ink)}

/* MAIN */
.thread-section{
  padding:60px 0 120px;
}

/* ORIGINAL POST */
.post-op{
  background:var(--bg-2);border:2px solid var(--teal);
  border-radius:12px;padding:40px;margin-bottom:60px;
}
.post-op-title{
  font-family:'Instrument Serif',serif;font-weight:400;
  font-size:clamp(24px,5vw,36px);color:var(--ink);
  line-height:1.2;margin:0 0 20px;
}
.post-op-meta{
  display:flex;gap:20px;margin-bottom:30px;
  font-size:13px;color:var(--ink-3);
}
.post-op-meta span{display:flex;align-items:center}
.post-op-meta strong{color:var(--ink)}
.post-op-body{
  font-size:15px;color:var(--ink);line-height:1.8;
  white-space:pre-wrap;word-wrap:break-word;
  margin-bottom:20px;
}
.post-op-badge{
  display:inline-block;padding:6px 14px;
  background:rgba(0,229,180,0.15);color:var(--teal);
  font-family:'JetBrains Mono',monospace;font-size:11px;
  letter-spacing:0.1em;border-radius:4px;
}

/* COMMENTS SECTION */
.comments-section{
  margin-top:80px;
}
.comments-header{
  display:flex;align-items:center;gap:12px;margin-bottom:32px;
  border-bottom:2px solid var(--rule-2);padding-bottom:16px;
}
.comments-count{
  font-family:'Instrument Serif',serif;font-weight:400;
  font-size:20px;color:var(--ink);
}
.comments-count-num{
  color:var(--teal);font-weight:600;
}

/* COMMENT */
.comment{
  display:flex;gap:16px;margin-bottom:24px;
  animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

.comment-avatar{
  width:40px;height:40px;flex-shrink:0;
  background:linear-gradient(135deg, var(--teal) 0%, var(--rule-2) 100%);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:var(--bg);font-weight:700;font-size:16px;
}

.comment-body{
  flex:1;background:var(--bg-3);
  border:1px solid var(--rule-2);border-radius:8px;padding:16px;
  transition:all 0.2s ease;
}
.comment-body:hover{border-color:var(--rule)}

.comment-header{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
  flex-wrap:wrap;
}
.comment-author{
  font-weight:600;color:var(--ink);
  font-size:14px;
}
.comment-time{
  font-size:12px;color:var(--ink-3);
}
.comment-badge{
  display:inline-block;padding:2px 8px;
  background:rgba(0,229,180,0.15);color:var(--teal);
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:0.08em;border-radius:3px;
}
.comment-title{
  font-weight:600;color:var(--ink);
  font-size:13px;margin-bottom:6px;
}
.comment-text{
  font-size:14px;color:var(--ink-2);line-height:1.7;
  white-space:pre-wrap;word-wrap:break-word;
}

/* REPLY FORM */
.comment-form{
  background:var(--bg-2);border:2px solid var(--rule-2);
  border-radius:12px;padding:32px;margin-top:60px;
}
.comment-form h3{
  font-family:'Instrument Serif',serif;font-weight:400;
  font-size:20px;color:var(--ink);margin:0 0 24px;
}

.form-group{margin-bottom:20px}
.form-group label{
  display:block;font-family:'JetBrains Mono',monospace;
  font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink-3);margin-bottom:6px;font-weight:500;
}
.form-group input,
.form-group textarea{
  width:100%;padding:12px 14px;
  font-family:'Space Grotesk',sans-serif;font-size:14px;
  color:var(--ink);background:var(--bg);
  border:1px solid var(--rule-2);border-radius:6px;
  outline:none;transition:border-color 0.25s ease;
}
.form-group input:focus,
.form-group textarea:focus{
  border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,229,180,0.1);
}
.form-group textarea{resize:vertical;min-height:100px}

.checkbox-group{
  display:flex;align-items:center;gap:12px;
  margin:20px 0;cursor:pointer;user-select:none;
}
.checkbox-group input[type="checkbox"]{
  width:18px;height:18px;cursor:pointer;
  accent-color:var(--teal);
}
.checkbox-group label{
  margin:0;font-size:13px;color:var(--ink-2);cursor:pointer;
}

.form-actions{
  display:flex;gap:12px;justify-content:flex-end;margin-top:24px;
}
.form-actions button{
  padding:12px 24px;border:none;border-radius:6px;
  cursor:pointer;font-family:'Space Grotesk',sans-serif;
  font-weight:600;transition:all 0.2s ease;
}
.form-actions .btn-submit{
  background:var(--teal);color:var(--bg);
}
.form-actions .btn-submit:hover{
  transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,229,180,0.2);
}

/* EMPTY STATE */
.empty-state{
  text-align:center;padding:60px 32px;
}

/* LOADING */
.loading{
  text-align:center;padding:60px 32px;color:var(--ink-3);
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="logo">Nimbus<span>.</span></a>
    <a href="/forum" class="back">&larr; Back to forum</a>
  </div>
</nav>

<!-- THREAD -->
<div class="wrap">
  <div class="thread-section">

    <!-- ORIGINAL POST -->
    <div id="thread-post" class="post-op">
      <div class="loading">Loading thread...</div>
    </div>

    <!-- COMMENTS -->
    <div id="comments-section" style="display:none;">
      <div class="comments-header">
        <div class="comments-count"><span class="comments-count-num" id="comment-count">0</span> Replies</div>
      </div>

      <div id="comments-list" style="margin-bottom:60px;">
      </div>

      <!-- REPLY FORM -->
      <div class="comment-form">
        <h3>Reply to this thread</h3>
        <form id="comment-form" onsubmit="submitComment(event)">
          <div class="form-group">
            <label for="comment-name">Name</label>
            <input type="text" id="comment-name" name="name" required placeholder="Your name">
          </div>

          <div class="form-group">
            <label for="comment-body">Message</label>
            <textarea id="comment-body" name="body" required placeholder="Share your thoughts..."></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-submit">Post Reply</button>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>

<script>
const threadId = new URLSearchParams(window.location.search).get('id');

if (!threadId) {
  document.getElementById('thread-post').innerHTML = '<div class="empty-state"><h2>Invalid thread</h2></div>';
} else {
  loadThread();
}

async function loadThread() {
  try {
    const response = await fetch(`/api/forum/thread?id=${threadId}`);
    if (!response.ok) throw new Error('Thread not found');

    const { thread, comments } = await response.json();
    renderThread(thread, comments);
  } catch (err) {
    console.error('Failed to load thread:', err);
    document.getElementById('thread-post').innerHTML = '<div class="empty-state"><h2>Error loading thread</h2></div>';
  }
}

function renderThread(thread, comments) {
  const badge = thread.owns_nimbus ? '<div class="post-op-badge">Nimbus Owner</div>' : '';

  document.getElementById('thread-post').innerHTML = `
    <h1 class="post-op-title">${escapeHtml(thread.title)}</h1>
    <div class="post-op-meta">
      <span><strong>${escapeHtml(thread.name)}</strong></span>
      <span>${new Date(thread.created_at).toLocaleString()}</span>
    </div>
    ${badge}
    <div class="post-op-body">${escapeHtml(thread.body)}</div>
  `;

  const commentsList = document.getElementById('comments-list');
  const commentsSection = document.getElementById('comments-section');

  if (comments && comments.length > 0) {
    commentsSection.style.display = 'block';
    document.getElementById('comment-count').textContent = comments.length;

    commentsList.innerHTML = comments.map((comment, i) => {
      const avatar = comment.name.charAt(0).toUpperCase();
      const badge = comment.owns_nimbus ? '<div class="comment-badge">Owner</div>' : '';
      return `
        <div class="comment">
          <div class="comment-avatar">${avatar}</div>
          <div class="comment-body">
            <div class="comment-header">
              <span class="comment-author">${escapeHtml(comment.name)}</span>
              <span class="comment-time">${new Date(comment.created_at).toLocaleString()}</span>
              ${badge}
            </div>
            <div class="comment-text">${escapeHtml(comment.body)}</div>
          </div>
        </div>
      `;
    }).join('');
  } else {
    commentsSection.style.display = 'block';
    document.getElementById('comment-count').textContent = '0';
    commentsList.innerHTML = '<div style="text-align:center;padding:40px;color:var(--ink-3);">No replies yet. Be the first!</div>';
  }
}

async function submitComment(e) {
  e.preventDefault();
  const form = e.target;
  const name = document.getElementById('comment-name').value;
  const body = document.getElementById('comment-body').value;

  const payload = { name, body };

  try {
    const response = await fetch(`/api/forum/thread?id=${threadId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!response.ok) throw new Error('Failed to post comment');

    form.reset();
    loadThread();
  } catch (err) {
    alert('Error posting reply: ' + err.message);
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>

</body>
</html>
